<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Iconic Placement Test</title>

  <!-- Load Questions -->
  <script src="./questions.js"></script>

  <!-- EmailJS -->
  <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
  <script>
    emailjs.init("KMcU2T2LvoWD9Auvf");
  </script>

  <style>
    body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; max-width: 800px; margin: auto; }
    h1 { color: #333; }
    .question-block { margin-bottom: 20px; }
    #result { margin-top: 30px; font-size: 22px; font-weight: bold; color: #2e7d32; }
    input[type="text"], input[type="email"] { padding: 8px; width: 250px; margin-bottom: 10px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
    button:hover { background-color: #0056b3; }
  </style>
</head>

<body>

<h1>English Placement Test</h1>

<input id="studentName" type="text" placeholder="Your Name" required><br>
<input id="studentEmail" type="email" placeholder="Your Email" required><br><br>

<form id="testForm"></form>

<button type="button" onclick="submitTest()">Submit Test</button>

<div id="result"></div>

<script>
  // DOM အပြည့်အဝ Load ဖြစ်ပြီးမှ မေးခွန်းများ ထုတ်ပေးမည်
  document.addEventListener("DOMContentLoaded", () => {
    const testForm = document.getElementById("testForm");
    
    if (typeof questions !== "undefined" && Array.isArray(questions)) {
      questions.forEach((q, index) => {
        let html = `
          <div class="question-block">
            <p><strong>${index + 1}. ${q.q}</strong></p>
        `;

        q.options.forEach((opt, i) => {
          html += `
            <label>
              <input type="radio" name="q${index}" value="${i}">
              ${opt}
            </label><br>
          `;
        });

        html += "</div><hr>";
        testForm.innerHTML += html;
      });
    } else {
      console.error("questions.js file မပွင့်ပါ သို့မဟုတ် ရေးသားပုံ လွဲမှားနေပါသည်။");
    }
  });

  // Submit Test Function
  function submitTest() {
    const name = document.getElementById("studentName").value.trim();
    const email = document.getElementById("studentEmail").value.trim();

    if (!name || !email) {
      alert("ကျေးဇူးပြု၍ အမည်နှင့် အီးမေးလ် ထည့်သွင်းပေးပါ။");
      return;
    }

    let score = 0;

    questions.forEach((q, index) => {
      const answer = document.querySelector(`input[name="q${index}"]:checked`);
      if (answer && Number(answer.value) === q.correct) {
        score++;
      }
    });

    document.getElementById("result").innerHTML = `Your Score: ${score} / ${questions.length}`;

    sendToGoogleSheet(name, email, score);
    sendEmail(name, email, score);
  }

  // Google Sheet သို့ ပို့ခြင်း
  function sendToGoogleSheet(name, email, score) {
    fetch("https://script.google.com/macros/s/AKfycby8hzA18ugQMGiiQhiuH29F5caMT8IE0GIAWm0Z1HvgiwflmnqVwuutAvbsJjesEdAi/exec", {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: name,
        email: email,
        score: score
      })
    }).catch(err => console.error("Sheet Error:", err));
  }

  // EmailJS မှတစ်ဆင့် အီးမေးလ် ပို့ခြင်း
  function sendEmail(name, email, score) {
    emailjs.send("service_41d3118", "template_s6ryi9e", {
      student_name: name,
      student_email: email,
      score: score
    }).catch(err => console.error("Email Error:", err));
  }
</script>

</body>
</html>
