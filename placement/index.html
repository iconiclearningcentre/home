<body>

<h1>English Placement Test</h1>

<input id="studentName" placeholder="Your Name" required><br><br>
<input id="studentEmail" placeholder="Your Email" required><br><br>

<form id="testForm"></form>

<button onclick="submitTest()">Submit Test</button>

<div id="result"></div>

<script>
  const form = document.getElementById("testForm");

  // Generate Questions
  questions.forEach((q, index) => {
    let html = `<div class='question-block'>
      <p>${index + 1}. ${q.q}</p>`;

    q.options.forEach((opt, i) => {
      html += `
        <label>
          <input type="radio" name="q${index}" value="${i}">
          ${opt}
        </label><br>
      `;
    });

    html += "</div><hr>";
    form.innerHTML += html;
  });

  // Submit Test
  function submitTest() {
    let score = 0;

    questions.forEach((q, index) => {
      const answer = document.querySelector(`input[name="q${index}"]:checked`);
      if (answer && Number(answer.value) === q.correct) {
        score++;
      }
    });

    document.getElementById("result").innerHTML =
      `Your Score: ${score} / ${questions.length}`;

    sendToGoogleSheet(score);
    sendEmail(score);
  }
