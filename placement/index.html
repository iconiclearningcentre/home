<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iconic Placement Test</title>

  <!-- Load Questions File -->
  <script src="./questions.js"></script>

  <!-- EmailJS CDN -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="text/javascript">
    (function(){
       emailjs.init("KMcU2T2LvoWD9Auvf");
    })();
  </script>

  <style>
    body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; max-width: 800px; margin: auto; }
    h1 { color: #333; }
    .question-block { margin-bottom: 20px; }
    input[type="text"], input[type="email"] { padding: 8px; width: 250px; margin-bottom: 10px; }
    
    /* Navigation Controls */
    .button-group { margin-top: 20px; display: flex; gap: 15px; align-items: center; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
    button:hover { background-color: #0056b3; }
    button:disabled { background-color: #ccc; cursor: not-allowed; }
    
    #pageIndicator { font-weight: bold; font-size: 16px; }
    #submitBtn { background-color: #28a745; display: none; }
    #submitBtn:hover { background-color: #218838; }
    
    .page-container { display: none; }
    .page-container.active { display: block; }

    /* Custom Popup (Modal) Styling */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-box {
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .modal-box h2 { margin-top: 0; color: #2e7d32; }
    .modal-box p { font-size: 20px; font-weight: bold; margin: 20px 0; }
    .modal-box button { background-color: #007bff; padding: 10px 25px; }
  </style>
</head>

<body>

<h1>English Placement Test</h1>

<input id="studentName" type="text" placeholder="Your Name" required><br>
<input id="studentEmail" type="email" placeholder="Your Email" required><br><br>

<form id="testForm"></form>

<!-- Navigation Controls -->
<div class="button-group">
  <button type="button" id="prevBtn" onclick="changePage(-1)" disabled>Previous</button>

  <span id="pageIndicator">Page 1</span>

  <button type="button" id="nextBtn" onclick="changePage(1)">Next</button>
  <button type="button" id="submitBtn" onclick="submitTest()">Submit Test</button>
</div>

<!-- Score Popup (Modal) -->
<div id="scoreModal" class="modal-overlay">
  <div class="modal-box">
    <h2>Test Completed!</h2>
    <p id="modalScoreText">Your Score: 0 / 0</p>
    <button type="button" onclick="closePopupAndGoHome()">OK / Return to Home</button>
  </div>
</div>

<script>
  const questionsPerPage = 10;
  let currentPage = 1;
  let totalPages = 1;

  document.addEventListener("DOMContentLoaded", () => {
    const testForm = document.getElementById("testForm");

    if (typeof questions === "undefined" || !Array.isArray(questions)) {
      alert("questions.js ဖိုင် မတွေ့ပါ သို့မဟုတ် Error ရှိနေပါသည်။");
      return;
    }

    totalPages = Math.ceil(questions.length / questionsPerPage);

    for (let page = 1; page <= totalPages; page++) {
      const pageDiv = document.createElement("div");
      pageDiv.className = `page-container ${page === 1 ? 'active' : ''}`;
      pageDiv.id = `page-${page}`;

      const startIndex = (page - 1) * questionsPerPage;
      const endIndex = Math.min(startIndex + questionsPerPage, questions.length);

      for (let i = startIndex; i < endIndex; i++) {
        const q = questions[i];
        let html = `
          <div class="question-block">
            <p><strong>${i + 1}. ${q.q}</strong></p>
        `;

        q.options.forEach((opt, optIndex) => {
          html += `
            <label>
              <input type="radio" name="q${i}" value="${optIndex}">
              ${opt}
            </label><br>
          `;
        });

        html += "</div><hr>";
        pageDiv.innerHTML += html;
      }

      testForm.appendChild(pageDiv);
    }

    updatePagination();
  });

  function changePage(direction) {
    document.getElementById(`page-${currentPage}`).classList.remove("active");
    currentPage += direction;
    document.getElementById(`page-${currentPage}`).classList.add("active");

    updatePagination();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function updatePagination() {
    document.getElementById("pageIndicator").innerText = `Page ${currentPage} of ${totalPages}`;
    document.getElementById("prevBtn").disabled = currentPage === 1;

    if (currentPage === totalPages) {
      document.getElementById("nextBtn").style.display = "none";
      document.getElementById("submitBtn").style.display = "inline-block";
    } else {
      document.getElementById("nextBtn").style.display = "inline-block";
      document.getElementById("submitBtn").style.display = "none";
    }
  }

  function submitTest() {
    const name = document.getElementById("studentName").value.trim();
    const email = document.getElementById("studentEmail").value.trim();

    if (!name || !email) {
      alert("ကျေးဇူးပြု၍ အမည်နှင့် အီးမေးလ် ဖြည့်သွင်းပေးပါ။");
      return;
    }

    let score = 0;

    questions.forEach((q, index) => {
      const answer = document.querySelector(`input[name="q${index}"]:checked`);
      if (answer && Number(answer.value) === q.correct) {
        score++;
      }
    });

    // Google Sheet & EmailJS သို့ အချက်အလက်များ ပို့ခြင်း
    sendToGoogleSheet(name, email, score);
    sendEmail(name, email, score);

    // Popup ပေါ်တင်ပြခြင်း
    document.getElementById("modalScoreText").innerText = `Your Score: ${score} / ${questions.length}`;
    document.getElementById("scoreModal").style.display = "flex";
  }

  // Popup ကိုပိတ်ပြီး Homepage သို့ ပြန်သွားခြင်း
  function closePopupAndGoHome() {
    document.getElementById("scoreModal").style.display = "none";
    
    // Page ကို အစသို့ ပြန်လည် Reset/Reload လုပ်ပေးခြင်း (Homepage သို့ ရောက်ရှိစေမည်)
    window.location.reload(); 
    // သို့မဟုတ် တခြား Homepage URL သို့ သွားစေချင်ပါက အောက်ပါအတိုင်း ရေးနိုင်ပါတယ် -
    // window.location.href = "https://yourwebsite.com";
  }

  function sendToGoogleSheet(name, email, score) {
    fetch("https://script.google.com/macros/s/AKfycby8hzA18ugQMGiiQhiuH29F5caMT8IE0GIAWm0Z1HvgiwflmnqVwuutAvbsJjesEdAi/exec", {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, email: email, score: score })
    }).catch(err => console.error("Sheet Error:", err));
  }

  function sendEmail(name, email, score) {
    if (typeof emailjs !== "undefined") {
      emailjs.send("service_41d3118", "template_s6ryi9e", {
        student_name: name,
        student_email: email,
        score: score
      }).catch(err => console.error("Email Error:", err));
    }
  }
</script>

</body>
</html>
