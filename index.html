<style>
:root{
  --ink:#171717;
  --muted:#6e6e6e;
  --line:#e8e8e8;
  --soft:#f2f7f4;
  --accent:#1a5935;
  --accent2:#bd1e1e;
  --dark:#122b1c;
  --white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,Arial,sans-serif;color:var(--ink);background:#fff;line-height:1.5}
a{text-decoration:none;color:inherit}
.container{max-width:1180px;margin:auto;padding:0 28px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:13px 20px;border-radius:999px;font-size:14px;font-weight:700;border:1px solid var(--ink);transition:.2s}
.btn.dark{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.light{background:#fff;border-color:var(--line)}
.btn.accent{background:var(--accent2);border-color:var(--accent2);color:#fff}
.page-view{display:none}.page-view.active{display:block}
.input-field{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;margin-bottom:15px}
.progress-bar-container{width:100%;background:#e0e0e0;height:10px;border-radius:10px;margin-bottom:20px}
.progress-bar{height:100%;background:var(--accent);width:0%;border-radius:10px}
.question-card{margin-bottom:25px;padding-bottom:15px;border-bottom:1px solid #eee}
.question-title{font-size:18px;font-weight:700;margin-bottom:10px}
.options-list{list-style:none;padding:0}
.options-list label{display:flex;padding:10px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer}
</style>
</head>
