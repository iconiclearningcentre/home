<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanese Language Placement Test</title>

  <!-- EmailJS SDK -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="text/javascript">
    (function() {
      emailjs.init("hhfDn5aZiTq8y85Eb");
    })();
  </script>

  <style>
    :root {
      --primary-color: #4a90e2;
      --bg-color: #f4f7f9;
      --card-bg: #ffffff;
      --text-color: #333333;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }

    /* Page Views */
    .page-view {
      display: none;
      background: var(--card-bg);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .page-view.active {
      display: block;
    }

    h1, h2 {
      color: var(--primary-color);
    }

    .btn {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background-color: #357abd;
    }

    .btn-secondary {
      background-color: #6c757d;
    }

    .btn-secondary:hover {
      background-color: #5a6268;
    }

    /* Test Styling */
    .question-card {
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid #eee;
    }

    .question-title {
      font-weight: 600;
      font-size: 17px;
      margin-bottom: 12px;
    }

    .options-list {
      list-style: none;
      padding: 0;
    }

    .options-list li {
      margin-bottom: 8px;
    }

    .options-list label {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .options-list label:hover {
      background-color: #f8f9fa;
    }

    .options-list input {
      margin-right: 12px;
    }

    .navigation-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    .progress-bar-container {
      width: 100%;
      background-color: #e0e0e0;
      border-radius: 10px;
      height: 10px;
      margin-bottom: 20px;
    }

    .progress-bar {
      height: 100%;
      background-color: var(--primary-color);
      width: 0%;
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    .input-field {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- PAGE 1: Landing Page / Welcome Section -->
    <div id="page-welcome" class="page-view active">
      <h1>Japanese Language Placement Test</h1>
      <p>ကျေးဇူးပြု၍ သင်၏ အချက်အလက်များ ဖြည့်သွင်းပြီး စာမေးပွဲကို စတင်ဖြေဆိုပါ။</p>
      
      <form id="user-info-form">
        <label for="student_name"><strong>အမည် (Full Name):</strong></label>
        <input type="text" id="student_name" class="input-field" placeholder="မောင်မောင်" required>

        <label for="student_email"><strong>အီးမေးလ် (Email Address):</strong></label>
        <input type="email" id="student_email" class="input-field" placeholder="example@gmail.com" required>

        <label for="student_phone"><strong>ဖုန်းနံပါတ် (Phone Number):</strong></label>
        <input type="tel" id="student_phone" class="input-field" placeholder="09xxxxxxxxx" required>

        <button type="button" class="btn" onclick="startTest()">စတင်ဖြေဆိုမည်</button>
      </form>
    </div>

    <!-- PAGE 2: Inside Test Page -->
    <div id="page-test" class="page-view">
      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Placement Test</h2>
        <span id="page-indicator" style="font-weight: bold; color: #666;">Page 1</span>
      </div>

      <div id="questions-container"></div>

      <div class="navigation-buttons">
        <button id="prev-btn" class="btn btn-secondary" onclick="changePage(-1)" style="display:none;">ရှေ့သို့</button>
        <button id="next-btn" class="btn" onclick="changePage(1)">နောက်သို့</button>
        <button id="submit-btn" class="btn" onclick="submitTest()" style="display:none; background-color: #28a745;">အဖြေများ ပို့မည်</button>
      </div>
    </div>

    <!-- PAGE 3: Result / Thank You Page -->
    <div id="page-result" class="page-view" style="text-align: center;">
      <h2>ကျေးဇူးတင်ရှိပါသည်။</h2>
      <p>သင်၏ စာမေးပွဲ အဖြေများကို အောင်မြင်စွာ ပို့ဆောင်ပြီးပါပြီ။</p>
      <h3 id="score-display"></h3>
      <button class="btn" onclick="location.reload()">မူလစာမျက်နှာသို့ ပြန်သွားမည်</button>
    </div>

  </div>

  <script>
    // ==========================================
    // မေးခွန်းများ စာရင်း (ဒီမှာ မေးခွန်း ၆၀ အထိ တိုးချဲ့ ထည့်နိုင်ပါတယ်)
    // ==========================================
    const questions = [
      { id: 1, text: "これは _____ ですか。", options: ["なん", "なに", "どれ", "dare"], answer: 0 },
      { id: 2, text: "わたしは 毎日 7時に _____。", options: ["おきます", "ねます", "たべます", "いきます"], answer: 0 },
      { id: 3, text: "きのう どこへも _____。", options: ["いきませんでした", "いきました", "いきます", "いきません"], answer: 0 },
      { id: 4, text: "部屋に テーブル _____ イスがあります。", options: ["と", "や", "に", "を"], answer: 0 },
      { id: 5, text: "この 料理は _____ です。", options: ["おいしい", "おいしくない", "おいしかった", "おいしいです"], answer: 0 },
      
      // မေးခွန်း Sample များကို အောက်ပါ format အတိုင်း မေးခွန်း ၆၀ အထိ ကူးပြီး ထည့်နိုင်ပါတယ်:
      { id: 6, text: "明日 友達 _____ 会います。", options: ["に", "を", "へ", "で"], answer: 0 },
      { id: 7, text: "日本語 _____ 話すことができます。", options: ["が", "を", "に", "で"], answer: 0 },
      { id: 8, text: "雨が _____ から、傘を 持っていきます。", options: ["ふっている", "ふります", "ふって", "ふった"], answer: 0 },
      { id: 9, text: "ここに 車を _____ ください。", options: ["とめないで", "とめます", "とめて", "とめる"], answer: 0 },
      { id: 10, text: "パスポートを _____ 必要があります。", options: ["みせる", "みせて", "みせます", "みせた"], answer: 0 }
    ];

    const QUESTIONS_PER_PAGE = 5; // တစ်မျက်နှာမှာ ပေါ်မယ့် မေးခွန်း အရေအတွက်
    let currentPage = 0;
    let userAnswers = {};
    let studentData = {};

    function showPage(pageId) {
      document.querySelectorAll('.page-view').forEach(el => el.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
    }

    function startTest() {
      const name = document.getElementById('student_name').value.trim();
      const email = document.getElementById('student_email').value.trim();
      const phone = document.getElementById('student_phone').value.trim();

      if (!name || !email || !phone) {
        alert('ကျေးဇူးပြု၍ အချက်အလက်များကို အပြည့်အစုံ ဖြည့်သွင်းပေးပါ။');
        return;
      }

      studentData = { name, email, phone };
      showPage('page-test');
      renderQuestions();
    }

    function renderQuestions() {
      const container = document.getElementById('questions-container');
      container.innerHTML = '';

      const start = currentPage * QUESTIONS_PER_PAGE;
      const end = Math.min(start + QUESTIONS_PER_PAGE, questions.length);
      const pageQuestions = questions.slice(start, end);

      pageQuestions.forEach((q) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'question-card';

        let optionsHtml = '';
        q.options.forEach((opt, optIdx) => {
          const isChecked = userAnswers[q.id] === optIdx ? 'checked' : '';
          optionsHtml += `
            <li>
              <label>
                <input type="radio" name="q_${q.id}" value="${optIdx}" ${isChecked} onchange="saveAnswer(${q.id}, ${optIdx})">
                ${opt}
              </label>
            </li>
          `;
        });

        qDiv.innerHTML = `
          <div class="question-title">${q.id}. ${q.text}</div>
          <ul class="options-list">${optionsHtml}</ul>
        `;
        container.appendChild(qDiv);
      });

      // Update Navigation Buttons & Indicators
      const totalPages = Math.ceil(questions.length / QUESTIONS_PER_PAGE);
      document.getElementById('page-indicator').innerText = `Page ${currentPage + 1} of ${totalPages}`;
      
      document.getElementById('prev-btn').style.display = currentPage === 0 ? 'none' : 'inline-block';
      
      if (currentPage === totalPages - 1) {
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'inline-block';
      } else {
        document.getElementById('next-btn').style.display = 'inline-block';
        document.getElementById('submit-btn').style.display = 'none';
      }

      // Progress Bar Update
      const progressPercent = ((currentPage + 1) / totalPages) * 100;
      document.getElementById('progress-bar').style.width = progressPercent + '%';
      
      window.scrollTo(0, 0);
    }

    function saveAnswer(qId, optIdx) {
      userAnswers[qId] = optIdx;
    }

    function changePage(direction) {
      currentPage += direction;
      renderQuestions();
    }

    function submitTest() {
      // ရမှတ် တွက်ချက်ခြင်း
      let score = 0;
      questions.forEach(q => {
        if (userAnswers[q.id] === q.answer) {
          score++;
        }
      });

      const totalQuestions = questions.length;
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.innerText = "ပို့ဆောင်နေပါသည်...";

      // EmailJS သို့ ပို့ဆောင်မည့် အချက်အလက်များ
      const templateParams = {
        user_name: studentData.name,
        user_email: studentData.email,
        user_phone: studentData.phone,
        score: `${score} / ${totalQuestions}`,
        message: `Student ${studentData.name} completed the Placement Test. Score: ${score}/${totalQuestions}`
      };

      const serviceID = 'service_co1k8t1';
      const templateID = 'template_s4oaq5m';

      emailjs.send(serviceID, templateID, templateParams)
        .then(() => {
          document.getElementById('score-display').innerText = `သင်၏ ရမှတ်: ${score} / ${totalQuestions}`;
          showPage('page-result');
        }, (error) => {
          alert('အဖြေများ ပို့ဆောင်ရာတွင် အမှားအယွင်း ရှိနေပါသည်။ ပြန်လည် ကြိုးစားကြည့်ပါ။');
          console.error('EmailJS Error:', error);
          submitBtn.disabled = false;
          submitBtn.innerText = "အဖြေများ ပို့မည်";
        });
    }
  </script>
</body>
</html>
