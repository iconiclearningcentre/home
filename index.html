<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmailJS Setup</title>

  <!-- EmailJS SDK ကို ချိတ်ဆက်ခြင်း -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="text/javascript">
    (function() {
      // သင်၏ Public Key ဖြင့် Init လုပ်ခြင်း
      emailjs.init("hhfDn5aZiTq8y85Eb");
    })();
  </script>
</head>
<body>

  <h2>Contact Form</h2>

  <!-- Form Setup (input 'name' attribute များသည် EmailJS Template Variables များနှင့် တူရပါမည်) -->
  <form id="contact-form">
    <label for="user_name">Name:</label><br>
    <input type="text" id="user_name" name="user_name" required><br><br>

    <label for="user_email">Email:</label><br>
    <input type="email" id="user_email" name="user_email" required><br><br>

    <label for="message">Message:</label><br>
    <textarea id="message" name="message" required></textarea><br><br>

    <button type="submit">Send Email</button>
  </form>

  <script type="text/javascript">
    document.getElementById('contact-form').addEventListener('submit', function(event) {
      event.preventDefault(); // Form ပုံမှန် Submit လုပ်ပြီး Refresh ဖြစ်သွားတာကို တားဆီးခြင်း

      const serviceID = 'service_co1k8t1';
      const templateID = 'template_s4oaq5m';

      // Form ၏ အချက်အလက်များကို EmailJS သို့ ပို့ဆောင်ခြင်း
      emailjs.sendForm(serviceID, templateID, this)
        .then(() => {
          alert('Email ပို့ဆောင်မှု အောင်မြင်ပါသည်။');
          document.getElementById('contact-form').reset(); // Form ကို ပြန်ရှင်းခြင်း
        }, (error) => {
          alert('FAILED... ' + JSON.stringify(error));
        });
    });
  </script>

</body>
</html>
