<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Language Placement Test</title>

  <!-- EmailJS SDK -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="text/javascript">
    (function() {
      emailjs.init("hhfDn5aZiTq8y85Eb");
    })();
  </script>

  <style>
    :root {
      --primary-color: #4a90e2;
      --bg-color: #f4f7f9;
      --card-bg: #ffffff;
      --text-color: #333333;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }

    /* Page Views */
    .page-view {
      display: none;
      background: var(--card-bg);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .page-view.active {
      display: block;
    }

    h1, h2 {
      color: var(--primary-color);
    }

    .btn {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover {
      background-color: #357abd;
    }

    .btn-secondary {
      background-color: #6c757d;
    }

    .btn-secondary:hover {
      background-color: #5a6268;
    }

    /* Test Styling */
    .question-card {
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid #eee;
    }

    .question-title {
      font-weight: 600;
      font-size: 17px;
      margin-bottom: 12px;
    }

    .options-list {
      list-style: none;
      padding: 0;
    }

    .options-list li {
      margin-bottom: 8px;
    }

    .options-list label {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .options-list label:hover {
      background-color: #f8f9fa;
    }

    .options-list input {
      margin-right: 12px;
    }

    .navigation-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    .progress-bar-container {
      width: 100%;
      background-color: #e0e0e0;
      border-radius: 10px;
      height: 10px;
      margin-bottom: 20px;
    }

    .progress-bar {
      height: 100%;
      background-color: var(--primary-color);
      width: 0%;
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    .input-field {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- PAGE 1: Landing Page / User Registration -->
    <div id="page-welcome" class="page-view active">
      <h1>English Placement Test</h1>
      <p>ကျေးဇူးပြု၍ သင်၏ အချက်အလက်များ ဖြည့်သွင်းပြီး စာမေးပွဲကို စတင်ဖြေဆိုပါ။</p>
      
      <form id="user-info-form">
        <label for="student_name"><strong>အမည် (Full Name):</strong></label>
        <input type="text" id="student_name" class="input-field" placeholder="Name" required>

        <label for="student_email"><strong>အီးမေးလ် (Email Address):</strong></label>
        <input type="email" id="student_email" class="input-field" placeholder="example@gmail.com" required>

        <label for="student_phone"><strong>ဖုန်းနံပါတ် (Phone Number):</strong></label>
        <input type="tel" id="student_phone" class="input-field" placeholder="09xxxxxxxxx" required>

        <button type="button" class="btn" onclick="startTest()">စတင်ဖြေဆိုမည်</button>
      </form>
    </div>

    <!-- PAGE 2: Inside Test Page -->
    <div id="page-test" class="page-view">
      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Placement Test</h2>
        <span id="page-indicator" style="font-weight: bold; color: #666;">Page 1</span>
      </div>

      <div id="questions-container"></div>

      <div class="navigation-buttons">
        <button id="prev-btn" class="btn btn-secondary" onclick="changePage(-1)" style="display:none;">ရှေ့သို့</button>
        <button id="next-btn" class="btn" onclick="changePage(1)">နောက်သို့</button>
        <button id="submit-btn" class="btn" onclick="submitTest()" style="display:none; background-color: #28a745;">အဖြေများ ပို့မည်</button>
      </div>
    </div>

    <!-- PAGE 3: Result / Thank You Page -->
    <div id="page-result" class="page-view" style="text-align: center;">
      <h2>ကျေးဇူးတင်ရှိပါသည်။</h2>
      <p>သင်၏ စာမေးပွဲ အဖြေများကို အောင်မြင်စွာ ပို့ဆောင်ပြီးပါပြီ။</p>
      <h3 id="score-display"></h3>
      <button class="btn" onclick="location.reload()">မူလစာမျက်နှာသို့ ပြန်သွားမည်</button>
    </div>

  </div>

  <script>
    // ==========================================
    // မေးခွန်းများ စာရင်း (အဖြေမှန် index: 0=A, 1=B, 2=C, 3=D)
    // ==========================================
    const questions = [
      { id: 1, text: "I ______ bus on Mondays.", options: ["'m going to work with", "'m going to work by", "go to work with", "go to work by"], answer: 3 },
      { id: 2, text: "Sorry, but this chair is ______.", options: ["me", "mine", "my", "our"], answer: 1 },
      { id: 3, text: "A: 'How old ______?'   B: 'I ______ .'", options: ["are you / am 20 years old.", "have you / have 20 years old", "are you / am 20 years.", "do you have / have 20 years."], answer: 0 },
      { id: 4, text: "I ______ to the cinema.", options: ["not usually go", "don't usually go", "don't go usually", "do not go usually"], answer: 1 },
      { id: 5, text: "Where ______ ?", options: ["your sister works", "your sister work", "does your sister work", "do your sister work"], answer: 2 },
      { id: 6, text: "The test is ______ February.", options: ["in", "at", "on", "over"], answer: 0 },
      { id: 7, text: "I eat pasta ______ week.", options: ["twice in a", "twice a", "one time a", "once in a"], answer: 1 },
      { id: 8, text: "I don't have ______ free time.", options: ["many", "any", "a lot", "some"], answer: 1 },
      { id: 9, text: "A: '_____ to the cinema tomorrow?'", options: ["We will go", "Do we go", "We go", "Shall we go"], answer: 3 },
      { id: 10, text: "We went to the market ______ some vegetables.", options: ["to buy", "for buy", "for to buy", "for buying"], answer: 0 },
      { id: 11, text: "Sorry, but when you called I ______ a shower.", options: ["had", "did have", "was having", "were having"], answer: 2 },
      { id: 12, text: "______ are very friendly and very intelligent.", options: ["Dolphins", "The dolphins", "A dolphin", "The dolphin"], answer: 0 },
      { id: 13, text: "Somebody stole ______ yesterday.", options: ["the car of my mother", "my car mother", "my mother's car", "my mother car"], answer: 2 },
      { id: 14, text: "______ with me?", options: ["Do you like to dance", "Would you like to dance", "Do you like dance", "Would you like dancing"], answer: 1 },
      { id: 15, text: "She is ______ her sister, I think.", options: ["more happier than", "more happy that", "happier that", "happier than"], answer: 3 },
      { id: 16, text: "I couldn't eat ______ before the exam.", options: ["nothing", "anything", "everything", "something"], answer: 1 },
      { id: 17, text: "Please, pass me the remote. ______ TV.", options: ["I'm watching", "I will watch", "I'm going to watch", "I might watch"], answer: 2 },
      { id: 18, text: "I'll call you when I ______ home.", options: ["arrive", "'m going to arrive", "will arrive", "arrived"], answer: 0 },
      { id: 19, text: "Have you ever ______ Japan?", options: ["been to", "gone to", "visited to", "been in"], answer: 0 }
    ];

    const QUESTIONS_PER_PAGE = 5; // တစ်မျက်နှာလျှင် မေးခွန်း ၅ ခုစီ ခွဲပြပါမည်
    let currentPage = 0;
    let userAnswers = {};
    let studentData = {};

    function showPage(pageId) {
      document.querySelectorAll('.page-view').forEach(el => el.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
    }

    function startTest() {
      const name = document.getElementById('student_name').value.trim();
      const email = document.getElementById('student_email').value.trim();
      const phone = document.getElementById('student_phone').value.trim();

      if (!name || !email || !phone) {
        alert('ကျေးဇူးပြု၍ အချက်အလက်များကို အပြည့်အစုံ ဖြည့်သွင်းပေးပါ။');
        return;
      }

      studentData = { name, email, phone };
      showPage('page-test');
      renderQuestions();
    }

    function renderQuestions() {
      const container = document.getElementById('questions-container');
      container.innerHTML = '';

      const start = currentPage * QUESTIONS_PER_PAGE;
      const end = Math.min(start + QUESTIONS_PER_PAGE, questions.length);
      const pageQuestions = questions.slice(start, end);

      const optionPrefixes = ['A.', 'B.', 'C.', 'D.'];

      pageQuestions.forEach((q) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'question-card';

        let optionsHtml = '';
        q.options.forEach((opt, optIdx) => {
          const isChecked = userAnswers[q.id] === optIdx ? 'checked' : '';
          optionsHtml += `
            <li>
              <label>
                <input type="radio" name="q_${q.id}" value="${optIdx}" ${isChecked} onchange="saveAnswer(${q.id}, ${optIdx})">
                <strong>${optionPrefixes[optIdx]}</strong>&nbsp; ${opt}
              </label>
            </li>
          `;
        });

        qDiv.innerHTML = `
          <div class="question-title">${q.id}. ${q.text}</div>
          <ul class="options-list">${optionsHtml}</ul>
        `;
        container.appendChild(qDiv);
      });

      // Navigation Buttons Update
      const totalPages = Math.ceil(questions.length / QUESTIONS_PER_PAGE);
      document.getElementById('page-indicator').innerText = `Page ${currentPage + 1} of ${totalPages}`;
      
      document.getElementById('prev-btn').style.display = currentPage === 0 ? 'none' : 'inline-block';
      
      if (currentPage === totalPages - 1) {
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'inline-block';
      } else {
        document.getElementById('next-btn').style.display = 'inline-block';
        document.getElementById('submit-btn').style.display = 'none';
      }

      // Progress Bar Update
      const progressPercent = ((currentPage + 1) / totalPages) * 100;
      document.getElementById('progress-bar').style.width = progressPercent + '%';
      
      window.scrollTo(0, 0);
    }

    function saveAnswer(qId, optIdx) {
      userAnswers[qId] = optIdx;
    }

    function changePage(direction) {
      currentPage += direction;
      renderQuestions();
    }

    function submitTest() {
      let score = 0;
      questions.forEach(q => {
        if (userAnswers[q.id] === q.answer) {
          score++;
        }
      });

      const totalQuestions = questions.length;
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.innerText = "ပို့ဆောင်နေပါသည်...";

      const templateParams = {
        user_name: studentData.name,
        user_email: studentData.email,
        user_phone: studentData.phone,
        score: `${score} / ${totalQuestions}`,
        message: `Student ${studentData.name} completed the Placement Test. Score: ${score}/${totalQuestions}`
      };

      const serviceID = 'service_co1k8t1';
      const templateID = 'template_s4oaq5m';

      emailjs.send(serviceID, templateID, templateParams)
        .then(() => {
          document.getElementById('score-display').innerText = `သင်၏ ရမှတ်: ${score} / ${totalQuestions}`;
          showPage('page-result');
        }, (error) => {
          alert('အဖြေများ ပို့ဆောင်ရာတွင် အမှားအယွင်း ရှိနေပါသည်။ ပြန်လည် ကြိုးစားကြည့်ပါ။');
          console.error('EmailJS Error:', error);
          submitBtn.disabled = false;
          submitBtn.innerText = "အဖြေများ ပို့မည်";
        });
    }
  </script>
</body>
</html>
